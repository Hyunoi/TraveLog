<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>여행 상세 - 트레블로그</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4">
<div class="container">
    <h2 class="mb-4">📸 여행 상세 및 사진</h2>
    <button class="btn btn-outline-secondary mb-3" onclick="goBack()">← 돌아가기</button>

    <!-- 📤 사진 업로드 -->
    <form id="uploadPhotoForm" class="mb-5">
        <input type="file" class="form-control mb-2" name="image" required>
        <input type="text" class="form-control mb-2" name="comment" placeholder="코멘트" required>
        <input type="text" class="form-control mb-2" name="location" placeholder="장소 (선택)">
        <button class="btn btn-warning w-100">사진 업로드</button>
    </form>

    <!-- 🖼 사진 목록 -->
    <ul id="photoList" class="list-group"></ul>
</div>

<!-- ✏️ 수정 모달 -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h5>사진 수정</h5>
        <form id="editPhotoForm">
            <input type="file" class="form-control mb-2" name="image">
            <input type="text" class="form-control mb-2" name="comment" placeholder="코멘트">
            <input type="text" class="form-control mb-2" name="location" placeholder="장소">
            <button type="submit" class="btn btn-primary w-100 mb-2">수정</button>
            <button type="button" class="btn btn-secondary w-100" onclick="closeEditModal()">닫기</button>
        </form>
    </div>
</div>

<!-- 📦 JS 모듈 불러오기 -->
<script type="module" src="./js/travel.js"></script>
</body>
</html>
