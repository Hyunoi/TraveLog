<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - 트레블로그</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="container">
    <h2 class="mb-4">📝 회원가입</h2>

    <form id="signupForm">
        <div class="mb-3">
            <input type="email" id="email" name="email" class="form-control" placeholder="이메일" required>
        </div>
        <div class="mb-3">
            <input type="password" id="password"  name="password" class="form-control" placeholder="비밀번호" required>
        </div>
        <div class="mb-3">
            <input type="text" id="nickname" name="nickname" class="form-control" placeholder="닉네임" required>
        </div>
        <button class="btn btn-primary w-100">회원가입</button>
    </form>

    <div class="mt-3 text-center">
        <a href="login.html">이미 계정이 있으신가요? 로그인</a>
    </div>
</div>

<script type="module" src="js/signup.js"></script>
</body>
</html>
