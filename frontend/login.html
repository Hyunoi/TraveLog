<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 트레블로그</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="container" style="max-width: 400px">
    <h2 class="mb-4">🔐 로그인</h2>

    <form id="loginForm">
        <input type="email" class="form-control mb-3" id="email" placeholder="이메일" required>
        <input type="password" class="form-control mb-3" id="password" placeholder="비밀번호" required>
        <button type="submit" class="btn btn-primary w-100">로그인</button>
    </form>

    <div class="mt-3 text-center">
        <a href="signup.html">아직 회원이 아니신가요?</a>
    </div>
</div>

<script type="module" src="./js/login.js"></script>
</body>
</html>
