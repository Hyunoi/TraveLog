spring:
  application:
    name: TraveLog

  datasource:
    driver-class-name: ${DATABASE_DRIVER}
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    show-sql: true
    generate-ddl: true
    hibernate:
      ddl-auto: update
      default_batch_fetch_size: 100
      dialect: org.hibernate.dialect.MySQL8Dialect
    defer-datasource-initialization: true

  jwt:
    secret: ${JWT_SECRET}

  data:
    redis:
      host: localhost
      port: 6379